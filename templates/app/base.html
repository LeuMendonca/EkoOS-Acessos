{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    {% block head %}
    
    {% endblock head %}
        
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
</head>

<body>

    <nav class="navbar navbar-expand-lg bg-primary"  id="navegacao">
        <div class="container-fluid">
          <a class="navbar-brand" href="/index/">EkoOS Acessos</a>
          
          <div class="collapse navbar-collapse" id="navbarColor02">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li>
                    <a data-bs-toggle="modal" data-bs-target="#cadastro" class="navbar-brand">Cadastro</a>
                </li>
                
                <form action="/cadastro/" method="post">
                    {% csrf_token %}
                    <div class="modal fade" id="cadastro" tabindex="-1" aria-labelledby="exampleModalLabel"
                        aria-hidden="true">

                        <div class="modal-dialog modal-lg">
                            <div class="modal-content">
                                <div class="modal-header">
                                    <h5 class="modal-title" id="exampleModalLabel">Cadastrar Acesso</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>

                                </div>

                                <div class="modal-body">
                                    <div class="col-auto">
                                        <div class="row">
                                            <div class="col">
                                                <div class="form-floating">
                                                    <input type="text" class="form-control" id="nome_empresa" name="nome_empresa" required>
                                                    <label for="nome_empresa">Empresa</label>
                                                </div>
                                            </div>

                                            <div class="col">
                                                <div class="form-floating">
                                                    <input type="text" class="form-control" id="nome_maquina" name="nome_maquina" required>
                                                    <label for="nome_maquina">Maquina</label>
                                                </div>
                                            </div>
                                        </div>


                                        <div class="py-2"></div>

                                        <div class="row">
                                            <div class="col">
                                                <div class="form-floating">
                                                    <input type="text" class="form-control" id="id_teamviewer" name="id_teamviewer">
                                                    <label for="id_teamviewer">Team Viewer</label>
                                                </div>
                                            </div>

                                            <div class="col">
                                                <div class="form-floating">
                                                    <input type="text" class="form-control" id="senha_teamviewer" name="senha_teamviewer">
                                                    <label for="senha_teamviewer">Senha Team Viewer</label>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="py-2"></div>

                                        <div class="row">
                                            <div class="col">
                                                <div class="form-floating">
                                                    <input type="text" class="form-control" id="id_anydesk" name="id_anydesk">
                                                    <label for="id_anydesk">Anydesk</label>
                                                </div>
                                            </div>

                                            <div class="col">
                                                <div class="form-floating">
                                                    <input type="text" class="form-control" id="senha_anydesk" name="senha_anydesk">
                                                    <label for="senha_anydesk">Senha Anydesk</label>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="py-2"></div>

                                        <div class="row">
                                            <div class="col">
                                                <div class="form-floating">
                                                    <input type="text" class="form-control" id="id_rustdesk" name="id_rustdesk">
                                                    <label for="id_rustdesk">Rustdesk</label>
                                                </div>
                                            </div>

                                            <div class="col">
                                                <div class="form-floating">
                                                    <input type="text" class="form-control" id="senha_rustdesk" name="senha_rustdesk">
                                                    <label for="senha_rustdesk">Senha Rustdesk</label>
                                                </div>
                                            </div>
                                        </div>

                                        <div class="py-2"></div>

                                        <div class="row">
                                            <div class="col">
                                                <div class="form-floating">
                                                    <input type="text" class="form-control" id="id_mstc" name="id_mstc">
                                                    <label for="id_mstc">MSTC</label>
                                                </div>
                                            </div>

                                            <div class="col">
                                                <div class="form-floating">
                                                    <input type="text" class="form-control" id="senha_mstc" name="senha_mstc">
                                                    <label for="senha_mstc">Senha MSTC</label>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="py-2"></div>

                                    <div class="row">
                                        <div class="col">
                                            <div class="form-floating">
                                                <textarea type="text" class="form-control" id="observacao" name="observacao"></textarea>
                                                <label for="observacao">Observação</label>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div class="modal-footer">
                                    <input type="submit" class="btn btn-primary" value="Cadastrar">
                                </div>
                            </div>

                        
                        </div>


                    </div>
                </form>
              

            </ul>
            
          </div>
        </div>
      </nav>

      
      {% block conteudo %}
        
      {% endblock conteudo %}
        





    <script src="{% static 'js/index.js' %}"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"
        integrity="sha384-fbbOQedDUMZZ5KreZpsbe1LCZPVmfTnH7ois6mU1QK+m14rQ1l2bGBq41eYeM/fS"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
</body>

</html>
